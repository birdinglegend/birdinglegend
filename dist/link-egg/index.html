<body class="relative min-h-screen overflow-hidden">

  <!-- BACKGROUND -->
  <div
    class="absolute inset-0 bg-cover bg-center scale-110 blur-xl"
    style="background-image:url('/assets/linktree-background-C0ZJQ1vX.webp')">
  </div>

  <!-- DARK OVERLAY -->
  <div class="absolute inset-0 bg-black/60"></div>

  <!-- CLICK AREA -->
  <div
    id="overlay"
    class="relative z-10 min-h-screen flex items-center justify-center"
  >

    <!-- CONTENT -->
    <main class="flex items-center justify-center min-h-screen">

      <div
  class="backdrop-blur-md bg-white/10 border border-white/20 rounded-3xl p-10 max-w-lg min-h-[500px] text-white"
  id="modal"
>

        <img
          src="/assets/screenshotlogo-CmN1HvSh.webp"
          class="w-26 h-24 rounded-full mx-auto mb-4"
        />

        <h1 class="text-3xl font-bold text-center text-white">
          Birding Legend
        </h1>

        <p class="text-center text-white/70 mb-8">
          Wildlife • Birding • Adventure
        </p>

        <div class="space-y-4">
          <a
            href="https://eugenesafaris.com/"
            class="block bg-red-600 hover:bg-red-500 rounded-xl px-5 py-4 text-center font-semibold transition-all duration-300"
          >
            Eugene Safaris
          </a>
           <a
            href="https://birdinglegend.com/"
            class="block bg-red-600 hover:bg-red-500 rounded-xl px-5 py-4 text-center font-semibold transition-all duration-300"
          >
            Birding Legend
          </a>
          <a
            href="https://www.youtube.com/@birdinglegend"
            class="block bg-red-600 hover:bg-red-500 rounded-xl px-5 py-4 text-center font-semibold transition-all duration-300"
          >
            YouTube
          </a>

        </div>

      </div>

    </main>

  </div>
  </body>

  <!-- JAVASCRIPT -->
  <script>

    const overlay = document.getElementById("overlay");
    const modal = document.getElementById("modal");

    // CLICK OUTSIDE MODAL
    overlay.addEventListener("click", (e) => {

      // only redirect if outside modal
      if (!modal.contains(e.target)) {

        // fade effect
        overlay.classList.add("opacity-0");
        overlay.classList.add("transition-opacity");
        overlay.classList.add("duration-300");

        setTimeout(() => {

          window.location.href =
            "https://www.youtube.com/@birdinglegend";

        }, 300);

      }

    });

    // ESC KEY
    document.addEventListener("keydown", (e) => {

      if (e.key === "Escape") {

        window.location.href =
          "https://www.youtube.com/@birdinglegend";

      }

    });

  </script>


</html>
